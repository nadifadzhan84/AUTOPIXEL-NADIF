name: Telegram Repo Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send Telegram channel notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          python - <<'PY'
          import html
          import json
          import os
          import subprocess
          from pathlib import Path
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHANNEL_ID", "").strip()
          if not token or not chat_id:
              raise SystemExit("Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHANNEL_ID GitHub secret.")

          def telegram_call(method, payload):
              data = urllib.parse.urlencode(payload).encode("utf-8")
              request = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/{method}",
                  data=data,
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8", errors="replace")
                      print(f"{method} response: {body}")
                      return json.loads(body)
              except urllib.error.HTTPError as exc:
                  error_body = exc.read().decode("utf-8", errors="replace")
                  print(f"{method} failed: HTTP {exc.code}")
                  print(error_body)
                  raise

          def run_git(*args):
              return subprocess.check_output(
                  ["git", *args],
                  text=True,
                  encoding="utf-8",
                  errors="replace",
              ).strip()

          before_sha_full = (os.environ.get("BEFORE_SHA") or "").strip()
          after_sha_full = (os.environ.get("SHA") or "").strip()
          zero_sha = "0" * 40

          def changed_file_list(*extra_args):
              try:
                  if before_sha_full and before_sha_full != zero_sha:
                      raw = run_git("diff", *extra_args, f"{before_sha_full}..{after_sha_full}")
                  else:
                      raw = run_git("show", *extra_args, "--pretty=format:", "HEAD")
              except Exception:
                  return []
              return [line.strip() for line in raw.splitlines() if line.strip()]

          changed_files = changed_file_list("--name-only")
          added_files = changed_file_list("--diff-filter=A", "--name-only")

          if changed_files and all(path.startswith(".github/") for path in changed_files):
              print("Skipping Telegram notification for workflow-only/internal changes.")
              raise SystemExit(0)

          try:
              if before_sha_full and before_sha_full != zero_sha:
                  shortstat = run_git("diff", "--shortstat", f"{before_sha_full}..{after_sha_full}")
              else:
                  shortstat = run_git("show", "--shortstat", "--format=", "HEAD")
          except Exception:
              shortstat = ""

          commit_message = (os.environ.get("COMMIT_MESSAGE") or "").strip()
          if not commit_message:
              try:
                  commit_message = run_git("log", "-1", "--pretty=%B")
              except Exception:
                  commit_message = ""
          commit_message = commit_message.strip() or "(no commit message)"
          commit_lines = [line.strip() for line in commit_message.splitlines()]
          headline = commit_lines[0] if commit_lines else "(no commit message)"
          details = [line for line in commit_lines[1:] if line]
          short_sha = (os.environ.get("SHA") or "")[:7]
          before_sha = (os.environ.get("BEFORE_SHA") or "")[:7]
          compare_url = os.environ.get("COMPARE_URL", "").strip()
          full_text = "\n".join(commit_lines).lower()

          has_docs = any(
              path.lower().endswith((".md", ".txt"))
              or path.lower() in {".env.example", "proxies.txt"}
              for path in changed_files
          )
          has_new_feature = bool(added_files) or any(
              signal in full_text
              for signal in ("feat", "feature", "new ", "add ", "introduce", "/doctor", "self-check")
          )
          has_fix = any(
              signal in full_text
              for signal in ("fix", "bug", "safer", "stability", "compat", "repair", "fallback", "crash")
          ) or any(path.lower().endswith(".py") for path in changed_files)

          badges = []
          if has_new_feature:
              badges.append("<code>🆕 NEW FEATURE</code>")
          if has_fix:
              badges.append("<code>🛠️ FIX</code>")
          if has_docs:
              badges.append("<code>📚 DOCS</code>")
          if not badges:
              badges.append("<code>✨ UPDATE</code>")

          def touches(*prefixes):
              return any(
                  path == prefix or path.startswith(prefix.rstrip("/") + "/")
                  for path in changed_files
                  for prefix in prefixes
              )

          def is_pixel_related_file(path):
              lowered = path.lower()
              exact_matches = {
                  "config.py",
                  "main.py",
                  "services/device_simulator.py",
                  "services/google_automation.py",
                  "services/proxy_forwarder.py",
                  "services/setup_diagnostics.py",
                  "services/wit_ai_solver.py",
                  "handlers/auth_handlers.py",
                  "handlers/offer_handlers.py",
                  "handlers/session_handlers.py",
                  "handlers/ui.py",
                  ".env.example",
                  "readme.md",
                  "changelog.md",
                  "how to get a wit.ai api key.txt",
              }
              prefix_matches = (
                  "assets/telegram/",
                  "services/google_",
                  "services/device_",
                  "services/proxy_",
                  "services/setup_",
                  "services/wit_",
                  "handlers/auth_",
                  "handlers/offer_",
                  "handlers/session_",
                  "handlers/ui",
              )
              keyword_matches = (
                  "pixel",
                  "google_automation",
                  "device_simulator",
                  "proxy_forwarder",
                  "wit_ai",
              )
              if lowered in exact_matches:
                  return True
              if any(lowered.startswith(prefix) for prefix in prefix_matches):
                  return True
              return any(keyword in lowered for keyword in keyword_matches)

          pixel_related_files = [path for path in changed_files if is_pixel_related_file(path)]

          def file_contains(path, needle):
              try:
                  return needle in Path(path).read_text(encoding="utf-8", errors="replace")
              except Exception:
                  return False

          product_highlights = []
          if touches("services/setup_diagnostics.py", "main.py", "handlers/session_handlers.py", "handlers/ui.py"):
              product_highlights.append("🩺 Add /doctor setup self-check and clearer first-run diagnostics for new users.")
          if touches("config.py"):
              product_highlights.append("🛡️ Make .env parsing safer so invalid numeric values do not crash startup.")
          if touches("handlers/session_handlers.py", "handlers/ui.py", ".env.example"):
              product_highlights.append("🧭 Expand /ip output with env-ready emulation timezone and GPS values for easier setup.")
          if touches("services/google_automation.py", "services/device_simulator.py", "services/proxy_forwarder.py", "handlers/auth_handlers.py", "handlers/offer_handlers.py"):
              product_highlights.append("🎯 Improve Google One / Pixel automation flow, session realism, and proxy-aware behavior.")
          if touches("README.md", "HOW TO RUN IT .txt", "CHANGELOG.md", ".env.example", "HOW TO GET A WIT.AI API KEY.txt"):
              product_highlights.append("📚 Refresh onboarding docs, run guide, and sample environment config for easier first use.")
          if touches("HOW TO GET A WIT.AI API KEY.txt"):
              product_highlights.append("🧠 Add an English step-by-step guide for getting and storing a Wit.ai server token.")
          if touches("proxies.txt", ".gitignore"):
              product_highlights.append("🌐 Keep proxies.txt as a tracked sample file so users can start from a ready template.")

          deduped_highlights = []
          for item in product_highlights:
              if item not in deduped_highlights:
                  deduped_highlights.append(item)
          product_highlights = deduped_highlights[:5]

          if pixel_related_files:
              badges.append("<code>📱 PIXEL UPDATE</code>")

          key_upgrade_lines = []
          if Path("services/wit_ai_solver.py").exists() and Path("services/google_automation.py").exists():
              key_upgrade_lines.append("┣ 🧠 Wit.ai audio captcha solving can now run before manual fallback during Google login.")
          if Path("handlers/auth_handlers.py").exists() and Path("services/runtime_settings.py").exists() and file_contains("main.py", 'CommandHandler(\"witai\"'):
              key_upgrade_lines.append("┣ 🤖 /witai lets operators save, replace, or clear the Wit.ai token directly from Telegram and persist it to .env.")
          if Path("services/setup_diagnostics.py").exists() and file_contains("main.py", 'CommandHandler(\"doctor\"'):
              key_upgrade_lines.append("┣ 🩺 /doctor runs a first-time setup self-check for token, Chrome, .env, banner media, proxy pool, and chromedriver readiness.")
          if Path("services/network_diagnostics.py").exists() and Path("services/device_simulator.py").exists():
              key_upgrade_lines.append("┣ 🧭 /ip now exposes .env-ready timezone and GPS values so Pixel emulation can match the active route more accurately.")
          if file_contains("services/google_automation.py", "StaleElementReferenceException"):
              key_upgrade_lines.append("┣ 🛡️ Google login is hardened against stale element re-renders, with safer re-query and retry behavior.")
          if Path("services/device_simulator.py").exists() and Path("services/google_automation.py").exists():
              key_upgrade_lines.append("┣ 📱 Pixel and Google One automation are more proxy-aware, with better timezone, geolocation, and device profile consistency.")
          if file_contains("handlers/offer_handlers.py", "PROXY_PRECHECK_ENABLED"):
              key_upgrade_lines.append("┣ ⚡ Visible Chrome startup is faster on authenticated proxies because first-launch precheck can be skipped when configured.")
          if file_contains("config.py", "def _env_text") and Path("services/setup_diagnostics.py").exists():
              key_upgrade_lines.append("┣ 🔒 .env parsing and proxy path fallback are safer, reducing startup crashes caused by blank or malformed values.")
          if file_contains("main.py", "bootstrap_retries=5"):
              key_upgrade_lines.append("┣ 🌐 Telegram bootstrap now retries transient DNS or network failures instead of aborting immediately.")
          if file_contains(".github/workflows/telegram-repo-update.yml", "Pixel Files Updated"):
              key_upgrade_lines.append("┣ 📣 GitHub Actions Telegram releases now flag Pixel-related pushes with a dedicated badge and file section.")
          if file_contains(".gitignore", "proxies.txt"):
              key_upgrade_lines.append("┣ 🔐 proxies.txt stays local and is no longer intended to be uploaded to the private repository.")
          if Path("HOW TO GET A WIT.AI API KEY.txt").exists():
              key_upgrade_lines.append("┣ 📘 An English Wit.ai API key guide is included for international users who need audio solver setup help.")
          if key_upgrade_lines:
              key_upgrade_lines[-1] = key_upgrade_lines[-1].replace("┣", "┗", 1)
          else:
              key_upgrade_lines = ["┗ <i>No platform capability summary is available for this build.</i>"]

          release_mode = "major" if (
              len(product_highlights) >= 3
              or bool(added_files)
              or touches("main.py", "config.py", "services", "handlers")
          ) else "minor"
          release_banner = (
              "🔥 <b>AUTOPIXEL MAJOR RELEASE</b>"
              if release_mode == "major"
              else "✨ <b>AUTOPIXEL MINOR UPDATE</b>"
          )
          release_subtitle = (
              "<code>⌬ GOOGLE ONE • PIXEL • USER-FACING UPDATE</code>"
              if release_mode == "major"
              else "<code>⌬ GOOGLE ONE • PIXEL • POLISH UPDATE</code>"
          )
          mode_badge = (
              "<code>🚨 MAJOR RELEASE</code>"
              if release_mode == "major"
              else "<code>🔹 MINOR UPDATE</code>"
          )

          def file_icon(path):
              lowered = path.lower()
              if lowered.endswith(".py"):
                  return "🐍"
              if lowered.endswith((".md", ".txt")):
                  return "📘"
              if lowered.endswith((".yml", ".yaml")):
                  return "⚙️"
              if lowered.endswith(".json"):
                  return "🧩"
              return "📄"

          file_lines = []
          for path in changed_files[:6]:
              file_lines.append(f"┣ {file_icon(path)} <code>{html.escape(path)}</code>")
          if changed_files:
              file_lines[-1] = file_lines[-1].replace("┣", "┗", 1)
          else:
              file_lines.append("┗ <i>No file list available.</i>")
          if len(changed_files) > 6:
              file_lines.append(f"➕ <i>{len(changed_files) - 6} more files changed</i>")

          pixel_file_lines = []
          for path in pixel_related_files[:5]:
              pixel_file_lines.append(f"┣ 📱 <code>{html.escape(path)}</code>")
          if pixel_related_files:
              pixel_file_lines[-1] = pixel_file_lines[-1].replace("┣", "┗", 1)
          else:
              pixel_file_lines.append("┗ <i>No Pixel-related files were detected in this push.</i>")
          if len(pixel_related_files) > 5:
              pixel_file_lines.append(f"➕ <i>{len(pixel_related_files) - 5} more Pixel-related files changed</i>")

          detail_lines = (
              [f"┣ ✦ {html.escape(line)}" for line in details[:-1]]
              + ([f"┗ ✦ {html.escape(details[-1])}"] if details else [])
          )
          highlight_lines = (
              [f"┣ {html.escape(line)}" for line in product_highlights[:-1]]
              + ([f"┗ {html.escape(product_highlights[-1])}"] if product_highlights else [])
          )
          if not highlight_lines:
              highlight_lines = ["┗ <i>User-facing highlights were not detected automatically for this commit.</i>"]
          text = "\n".join(
              [
                  release_banner,
                  release_subtitle,
                  "",
                  " ".join([mode_badge, *badges]),
                  "",
                  "┏ <b>Build Info</b>",
                  f"┣ 📦 Repo: <code>{html.escape(os.environ.get('REPOSITORY', '-'))}</code>",
                  f"┣ 🌿 Branch: <code>{html.escape(os.environ.get('BRANCH', '-'))}</code>",
                  f"┣ 🔖 Commit: <code>{html.escape(short_sha)}</code>",
                  f"┣ 🔄 Range: <code>{html.escape(before_sha or 'manual')} → {html.escape(short_sha)}</code>",
                  f"┣ 👤 Author: <code>{html.escape(os.environ.get('ACTOR', '-'))}</code>",
                  f"┗ ⚙️ Event: <code>{html.escape(os.environ.get('EVENT_NAME', '-'))}</code>",
                  "",
                  "┏ <b>What Users Need To Know</b>",
                  *highlight_lines,
                  "",
                  "┏ <b>Key Upgrades</b>",
                  *key_upgrade_lines,
                  "",
                  "┏ <b>Release Headline</b>",
                  f"┗ 📝 <b>{html.escape(headline)}</b>",
                  "",
                  "┏ <b>Included Updates</b>",
                  *(detail_lines or ["┗ ✦ <i>No detailed changelog lines were included in the commit body.</i>"]),
                  "",
                  "┏ <b>Files Changed</b>",
                  *file_lines,
                  *( [f"📊 <i>{html.escape(shortstat)}</i>"] if shortstat else [f"📊 <i>{len(changed_files)} file(s) changed</i>"] ),
                  "",
                  "┏ <b>Pixel Files Updated</b>",
                  *pixel_file_lines,
                  f"📱 <i>{len(pixel_related_files)} Pixel-related file(s) detected</i>",
                  "",
                  "┏ <b>Quick Links</b>",
                  f"┣ 🔗 <a href=\"{html.escape(os.environ.get('COMMIT_URL', '-'))}\">Open Commit</a>",
                  f"┣ 🧭 <a href=\"{html.escape(os.environ.get('RUN_URL', '-'))}\">Open Workflow Run</a>",
                  f"┗ 🪄 <a href=\"{html.escape(compare_url or os.environ.get('COMMIT_URL', '-'))}\">View Compare</a>",
                  "",
                  "✦ <b>Status</b>: <code>Delivered by GitHub Actions</code>",
                  "✦ <i>Modern repo pulse focused on AUTOPIXEL product changes for channel users</i>",
              ]
          )

          telegram_call("getMe", {})
          telegram_call("getChat", {"chat_id": chat_id})
          telegram_call(
              "sendMessage",
              {
                  "chat_id": chat_id,
                  "text": text,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": "true",
              },
          )
          PY
